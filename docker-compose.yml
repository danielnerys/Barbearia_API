services:
  app:
    build: .
    container_name: barbearia_api
    ports:
      - "8080:8080"
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: barbearia_db
      PGUSER: postgres
      PGPASSWORD: "0906"
      JWT_SECRET: MinhaChaveSuperSecretaBarbeariaAPI2026@JWT
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: barbearia_db
    environment:
      POSTGRES_DB: barbearia_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "0906"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d barbearia_db"]
      interval: 10s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: